<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>2048 — Mini Demo</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:radial-gradient(120% 120% at 50% 0%,#10204a 0%,#0a1024 70%);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; color:#dce6ff; user-select:none; padding:10px; touch-action:none; }
  .hud{ display:flex; gap:18px; font-size:14px; } .hud b{ color:#62e1ff; font-size:1.25em; }
  #stage{ display:flex; }
  #board{ position:relative; background:#16224a; border:1px solid #2b3c72; border-radius:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.4); transform-origin:center; }
  .slot{ position:absolute; background:#1b2647; border-radius:10px; }
  .tile{ position:absolute; transition:transform .12s ease; will-change:transform; }
  .face{ width:100%; height:100%; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-weight:800; background:#1c2a55; color:#eaf1ff; }
  .face.pop{ animation:pop .16s ease; } @keyframes pop{ 50%{ transform:scale(1.16) } }
  .tile.new .face{ animation:ap .14s ease; } @keyframes ap{ from{ transform:scale(.4); opacity:0 } }
  .tip{ font-size:11px; color:#7e8fc0; }
  #over{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:8px;
    background:rgba(8,12,30,.82); border-radius:14px; font-size:20px; font-weight:800; }
  #over button{ font:inherit; font-size:14px; padding:8px 18px; border:none; border-radius:8px; background:#4aa8ff; color:#06122b; font-weight:800; cursor:pointer; }
  .badge{ position:fixed; left:8px; bottom:6px; font-size:10px; color:#48598c; letter-spacing:.1em; }
</style>
</head>
<body>
  <div class="hud"><span>SCORE <b id="score">0</b></span><span>BEST <b id="best">0</b></span></div>
  <div id="stage"><div id="board"><div id="over"><div id="ovt">GAME OVER</div><button id="retry">Retry</button></div></div></div>
  <div class="tip">Use arrow keys or swipe to slide tiles. Matching numbers merge! Reach 2048!</div>
  <div class="badge">How to make puzzle game with AI — DEMO</div>

<script>
const N=4, CELL=70, GAP=8, PAD=8;
const COL={2:'#22325f',4:'#274a87',8:'#2f6fb0',16:'#37a0d8',32:'#37d8c0',64:'#37e08a',128:'#ffd23f',256:'#ffb02e',512:'#ff7a3d',1024:'#ff4d6d',2048:'#ff36c0'};
const boardEl=document.getElementById('board'), overEl=document.getElementById('over');
const BW=N*CELL+(N-1)*GAP+PAD*2; boardEl.style.width=boardEl.style.height=BW+'px';
function fit(){ const s=Math.min(1,(Math.min(window.innerWidth,460)-24)/BW); boardEl.style.transform='scale('+s+')'; }
addEventListener('resize',fit); fit();
const pos=i=>PAD+i*(CELL+GAP); const sleep=ms=>new Promise(r=>setTimeout(r,ms));
// 背景スロット
for(let r=0;r<N;r++)for(let c=0;c<N;c++){const s=document.createElement('div');s.className='slot';s.style.cssText=`width:${CELL}px;height:${CELL}px;transform:translate(${pos(c)}px,${pos(r)}px)`;boardEl.appendChild(s);}

let tiles=[], score=0, best=0, over=false, busy=false;
function setFace(t){ t.el.querySelector('.face').textContent=t.val; const f=t.el.querySelector('.face');
  f.style.background=COL[t.val]||'#ff36c0'; f.style.color=t.val>=128?'#3a1a00':'#eaf1ff';
  f.style.fontSize=(t.val<100?CELL*0.4:t.val<1000?CELL*0.32:CELL*0.26)+'px'; }
function mkTile(val,r,c,isNew){ const el=document.createElement('div'); el.className='tile'+(isNew?' new':'');
  el.style.width=el.style.height=CELL+'px'; el.style.transform=`translate(${pos(c)}px,${pos(r)}px)`;
  el.innerHTML='<div class="face"></div>'; boardEl.appendChild(el);
  const t={val,r,c,el}; setFace(t); if(isNew)setTimeout(()=>el.classList.remove('new'),150); return t; }
function cellGrid(){ const g=[...Array(N)].map(()=>Array(N).fill(null)); tiles.forEach(t=>g[t.r][t.c]=t); return g; }
function spawn(){ const g=cellGrid(),e=[]; for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!g[r][c])e.push([r,c]);
  if(!e.length)return; const[r,c]=e[Math.random()*e.length|0]; tiles.push(mkTile(Math.random()<0.9?2:4,r,c,true)); }
function farthest(g,r,c,v){ let nr=r,nc=c; while(true){const tr=nr+v[0],tc=nc+v[1]; if(tr<0||tr>=N||tc<0||tc>=N||g[tr][tc])break; nr=tr;nc=tc;} return {nr,nc,next:{r:nr+v[0],c:nc+v[1]}}; }

async function move(dir){
  if(over||busy)return; const v={0:[0,-1],1:[-1,0],2:[0,1],3:[1,0]}[dir];
  const g=cellGrid(); const rs=[...Array(N).keys()], cs=[...Array(N).keys()];
  if(v[0]>0)rs.reverse(); if(v[1]>0)cs.reverse();
  tiles.forEach(t=>{t.merged=false;t.remove=false;}); let moved=false;
  for(const r of rs)for(const c of cs){ const t=g[r][c]; if(!t)continue;
    const {nr,nc,next}=farthest(g,r,c,v);
    if(next.r>=0&&next.r<N&&next.c>=0&&next.c<N&&g[next.r][next.c]&&g[next.r][next.c].val===t.val&&!g[next.r][next.c].merged){
      const tgt=g[next.r][next.c]; g[r][c]=null; tgt.val*=2; tgt.merged=true;
      t.r=next.r;t.c=next.c;t.remove=true; score+=tgt.val; moved=true;
    } else { g[r][c]=null; g[nr][nc]=t; if(nr!==r||nc!==c)moved=true; t.r=nr;t.c=nc; }
  }
  if(!moved)return; busy=true;
  tiles.forEach(t=>t.el.style.transform=`translate(${pos(t.c)}px,${pos(t.r)}px)`);
  beep(300); await sleep(120);
  tiles.filter(t=>t.remove).forEach(t=>t.el.remove()); tiles=tiles.filter(t=>!t.remove);
  tiles.forEach(t=>{ if(t.merged){ setFace(t); const f=t.el.querySelector('.face'); f.classList.remove('pop'); void f.offsetWidth; f.classList.add('pop'); beep(520); } });
  document.getElementById('score').textContent=score; best=Math.max(best,score); document.getElementById('best').textContent=best;
  spawn(); busy=false; checkEnd();
}
function canMove(){ const g=cellGrid(); for(let r=0;r<N;r++)for(let c=0;c<N;c++){ if(!g[r][c])return true;
  if(c<N-1&&g[r][c+1]&&g[r][c].val===g[r][c+1].val)return true; if(r<N-1&&g[r+1][c]&&g[r][c].val===g[r+1][c].val)return true; } return false; }
function checkEnd(){ const win=tiles.some(t=>t.val>=2048);
  if(win||!canMove()){ over=true; document.getElementById('ovt').textContent=win?'2048! 🎉':'GAME OVER'; overEl.style.display='flex'; } }

addEventListener('keydown',e=>{ const k={ArrowLeft:0,ArrowUp:1,ArrowRight:2,ArrowDown:3}[e.key]; if(k!==undefined){e.preventDefault();audioOn();move(k);} });
let ts=null;
addEventListener('touchstart',e=>{audioOn();ts=[e.touches[0].clientX,e.touches[0].clientY];},{passive:true});
addEventListener('touchend',e=>{ if(!ts)return; const dx=e.changedTouches[0].clientX-ts[0],dy=e.changedTouches[0].clientY-ts[1];
  if(Math.abs(dx)<20&&Math.abs(dy)<20){ts=null;return;} move(Math.abs(dx)>Math.abs(dy)?(dx>0?2:0):(dy>0?3:1)); ts=null; },{passive:true});
document.getElementById('retry').onclick=()=>{ tiles.forEach(t=>t.el.remove()); tiles=[];score=0;over=false;overEl.style.display='none';document.getElementById('score').textContent=0; spawn();spawn(); };

let ac=null; function audioOn(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state!=='running')ac.resume();}
function beep(f){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.12);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+.13);}

spawn(); spawn();
</script>
</body>
</html>
