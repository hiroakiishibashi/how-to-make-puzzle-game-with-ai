<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>間違い探し</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--cs:min(14vw,54px);}
html,body{margin:0;height:100%;}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:8px;
  background:radial-gradient(120% 120% at 50% 0%,#10204a 0%,#0a1024 70%);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  color:#dce6ff;user-select:none;padding:10px;
}
.hud{display:flex;gap:18px;font-size:14px;}
.hud b{color:#62e1ff;font-size:1.25em;}
.panel{
  background:#16224a;border:1px solid #2b3c72;
  border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);
  padding:8px;width:100%;
}
.label{
  text-align:center;font-size:11px;color:#7e8fc0;
  letter-spacing:.06em;margin-bottom:4px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(6,var(--cs));
  gap:3px;
  justify-content:center;
}
.cell{
  width:var(--cs);height:var(--cs);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(16px,5vw,26px);
  border-radius:7px;
  background:#0d1a3a;
  border:1px solid #1e2e58;
  cursor:pointer;
  position:relative;
  transition:background .15s;
}
.cell:active{background:#1a2f60;}
.cell.found{background:#0a2e1a;border-color:#22ff7a;}
.cell.wrong-flash{animation:wrongflash .35s ease;}
@keyframes wrongflash{
  0%{background:#3a0a0a;}50%{background:#6a1414;}100%{background:#0d1a3a;}
}
.overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(18px,6vw,30px);
  border-radius:7px;
  pointer-events:none;
}
.overlay.correct{color:#22ff7a;text-shadow:0 0 8px #22ff7a;}
.overlay.miss{color:#ff4466;font-size:clamp(14px,4.5vw,24px);}
.tip{font-size:11px;color:#7e8fc0;text-align:center;}
button{
  font:inherit;background:#4aa8ff;color:#06122b;
  font-weight:800;border:none;border-radius:8px;
  padding:8px 22px;cursor:pointer;font-size:15px;
}
button:active{opacity:.8;}
#clear-msg{
  display:none;flex-direction:column;align-items:center;gap:10px;
  background:#16224a;border:1px solid #62e1ff;border-radius:14px;
  padding:16px 24px;text-align:center;
  box-shadow:0 0 24px rgba(98,225,255,.2);
}
#clear-msg h2{margin:0;color:#62e1ff;font-size:1.4em;}
#clear-msg p{margin:0;font-size:13px;color:#aac4e8;}
.badge{
  position:fixed;left:8px;bottom:6px;
  font-size:10px;color:#48598c;letter-spacing:.1em;
}
</style>
</head>
<body>

<div class="hud">
  <span>みつけた <b id="found-count">0</b>/5</span>
  <span>タイム <b id="timer">0</b>秒</span>
</div>

<div class="panel" id="grid-top-panel">
  <div class="label">▲ オリジナル</div>
  <div class="grid" id="grid-top"></div>
</div>

<div class="panel" id="grid-bot-panel">
  <div class="label">▼ どこか違う…</div>
  <div class="grid" id="grid-bot"></div>
</div>

<div class="tip" id="main-tip">違うと思うマスをタップ！（上下どちらでも可）</div>

<div id="clear-msg">
  <h2>🎉 CLEAR！</h2>
  <p id="clear-time"></p>
  <button onclick="startGame()">もう一度</button>
</div>

<div class="badge">How to make puzzle game with AI — DEMO</div>

<script>
// ─── Emoji pool（16種） ───────────────────────────────────────
const EMOJIS = [
  "🍎","🍋","🍇","🍓","🍑","🌸","⭐","🌙",
  "🔥","🐱","🐶","🦊","🐸","🌈","🎵","💎"
];

// ─── State ───────────────────────────────────────────────────
const ROWS = 5, COLS = 6, TOTAL = ROWS * COLS, DIFF_COUNT = 5;
let baseGrid = [];    // length=30, emoji strings
let diffSet  = new Set(); // indices of differences (in flat 30)
let foundSet = new Set();
let timerID  = null;
let elapsedSec = 0;
let gameActive = false;

// ─── DOM refs ────────────────────────────────────────────────
const gridTop      = document.getElementById("grid-top");
const gridBot      = document.getElementById("grid-bot");
const foundCountEl = document.getElementById("found-count");
const timerEl      = document.getElementById("timer");
const clearMsg     = document.getElementById("clear-msg");
const clearTimeEl  = document.getElementById("clear-time");
const mainTip      = document.getElementById("main-tip");

// ─── Audio (Web Audio API) ───────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e){}
}
function soundCorrect() {
  playTone(660, "sine", 0.12, 0.3);
  setTimeout(() => playTone(880, "sine", 0.15, 0.25), 80);
}
function soundWrong() {
  playTone(200, "sawtooth", 0.1, 0.15);
}
function soundClear() {
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,"sine",0.2,0.3),i*90));
}

// ─── Helpers ─────────────────────────────────────────────────
function randInt(n) { return Math.floor(Math.random() * n); }

// Pick k unique indices from [0, max)
function sampleIndices(max, k) {
  const pool = Array.from({length: max}, (_, i) => i);
  for (let i = pool.length - 1; i > 0; i--) {
    const j = randInt(i + 1);
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return new Set(pool.slice(0, k));
}

// Pick a different emoji from pool
function differentEmoji(current) {
  const choices = EMOJIS.filter(e => e !== current);
  return choices[randInt(choices.length)];
}

// ─── Build grids ─────────────────────────────────────────────
function buildGridDOM(container, emojiArray, isDiff) {
  container.innerHTML = "";
  emojiArray.forEach((em, idx) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.idx = idx;
    cell.dataset.which = isDiff ? "bot" : "top";
    cell.textContent = em;
    cell.addEventListener("click", onCellClick);
    container.appendChild(cell);
  });
}

// ─── Game flow ───────────────────────────────────────────────
function startGame() {
  // Clear state
  clearInterval(timerID);
  elapsedSec = 0;
  timerEl.textContent = "0";
  foundSet.clear();
  foundCountEl.textContent = "0";
  clearMsg.style.display = "none";
  mainTip.style.display = "";
  gameActive = false;

  // Build base grid
  baseGrid = Array.from({length: TOTAL}, () => EMOJIS[randInt(EMOJIS.length)]);

  // Pick exactly DIFF_COUNT unique positions for differences
  diffSet = sampleIndices(TOTAL, DIFF_COUNT);

  // Build diff grid
  const diffGrid = baseGrid.slice();
  for (const idx of diffSet) {
    diffGrid[idx] = differentEmoji(baseGrid[idx]);
  }

  // Render
  buildGridDOM(gridTop, baseGrid, false);
  buildGridDOM(gridBot, diffGrid, true);

  // Start timer (slight delay so user sees the board first)
  setTimeout(() => {
    gameActive = true;
    timerID = setInterval(() => {
      elapsedSec++;
      timerEl.textContent = elapsedSec;
    }, 1000);
  }, 500);
}

// ─── Tap/Click handler ───────────────────────────────────────
function onCellClick(e) {
  if (!gameActive) return;
  const idx = parseInt(e.currentTarget.dataset.idx, 10);

  if (foundSet.has(idx)) return; // already found

  if (diffSet.has(idx)) {
    // Correct!
    foundSet.add(idx);
    markFound(idx);
    foundCountEl.textContent = foundSet.size;
    soundCorrect();
    if (foundSet.size >= DIFF_COUNT) {
      onClear();
    }
  } else {
    // Wrong
    flashWrong(e.currentTarget);
    soundWrong();
  }
}

function markFound(idx) {
  // Mark both top and bottom cells
  ["grid-top", "grid-bot"].forEach(gridId => {
    const container = document.getElementById(gridId);
    const cell = container.querySelector(`[data-idx="${idx}"]`);
    if (!cell) return;
    cell.classList.add("found");
    cell.removeEventListener("click", onCellClick);
    // Add circle overlay
    const ov = document.createElement("div");
    ov.className = "overlay correct";
    ov.textContent = "○";
    cell.appendChild(ov);
  });
}

function flashWrong(cell) {
  // Show × briefly
  const ov = document.createElement("div");
  ov.className = "overlay miss";
  ov.textContent = "×";
  cell.appendChild(ov);
  cell.classList.add("wrong-flash");
  setTimeout(() => {
    ov.remove();
    cell.classList.remove("wrong-flash");
  }, 400);
}

function onClear() {
  clearInterval(timerID);
  gameActive = false;
  soundClear();
  mainTip.style.display = "none";
  clearMsg.style.display = "flex";
  clearTimeEl.textContent = `タイム: ${elapsedSec} 秒`;
}

// ─── Start immediately ───────────────────────────────────────
startGame();
</script>
</body>
</html>
