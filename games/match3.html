<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Fruit Match — ミニデモ</title>
<style>
  :root{ --cell:min(13vw,52px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; background:radial-gradient(120% 120% at 50% 0%,#10204a 0%,#0a1024 70%);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; color:#dce6ff; user-select:none; padding:10px; }
  .hud{ display:flex; gap:18px; font-size:14px; letter-spacing:.05em; }
  .hud b{ color:#62e1ff; font-size:1.25em; }
  #board{ display:grid; grid-template-columns:repeat(6,var(--cell)); grid-template-rows:repeat(6,var(--cell));
    gap:5px; padding:8px; background:#16224a; border:1px solid #2b3c72; border-radius:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .cell{ width:var(--cell); height:var(--cell); border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:transform .12s, box-shadow .12s; }
  .cell:active{ transform:scale(.92); }
  .gem{ width:78%; height:78%; border-radius:50%; }
  .sel{ outline:3px solid #ffd24a; outline-offset:1px; box-shadow:0 0 12px #ffd24a; }
  @keyframes pop{ 0%{transform:scale(1)} 40%{transform:scale(1.3); filter:brightness(2.4)} 100%{transform:scale(0); opacity:0} }
  .pop{ animation:pop .18s ease-out forwards; }
  .tip{ font-size:11px; color:#7e8fc0; }
  .badge{ position:fixed; left:8px; bottom:6px; font-size:10px; color:#48598c; letter-spacing:.1em; }
</style>
</head>
<body>
  <div class="hud"><span>SCORE <b id="score">0</b></span><span>CHAIN <b id="chain">0</b></span></div>
  <div id="board"></div>
  <div class="tip">同じ色を縦か横に3つそろえよう（タップ→隣をタップ／スワイプ）</div>
  <div class="badge">How to make puzzle game with AI — DEMO</div>

<script>
const SIZE=6, EMPTY=-1;
const COLORS=['#ff3b6b','#37e0a0','#ffd23f','#4aa8ff','#c77dff'];
const GRAD=COLORS.map(c=>`radial-gradient(circle at 32% 28%, #ffffff 0%, ${c} 42%, ${shade(c)} 100%)`);
function shade(hex){ // 暗い縁色
  const n=parseInt(hex.slice(1),16); const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return `rgb(${r*0.45|0},${g*0.45|0},${b*0.45|0})`; }
let board=[], sel=null, busy=false, score=0;
const boardEl=document.getElementById('board');

function init(){ board=[]; for(let r=0;r<SIZE;r++){const row=[];for(let c=0;c<SIZE;c++)row.push(rnd());board.push(row);} }
function rnd(){ return Math.floor(Math.random()*COLORS.length); }

function render(){
  boardEl.innerHTML='';
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const cell=document.createElement('div'); cell.className='cell'; cell.dataset.r=r; cell.dataset.c=c;
    if(board[r][c]!==EMPTY){ const g=document.createElement('div'); g.className='gem'; g.style.background=GRAD[board[r][c]]; cell.appendChild(g); }
    if(sel&&sel.r===r&&sel.c===c) cell.classList.add('sel');
    boardEl.appendChild(cell);
  }
}
function adj(a,b){ return Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1; }
function swap(a,b){ const t=board[a.r][a.c]; board[a.r][a.c]=board[b.r][b.c]; board[b.r][b.c]=t; }

function findMatches(){
  const m=new Set();
  for(let r=0;r<SIZE;r++){let s=0;for(let c=1;c<=SIZE;c++){const same=c<SIZE&&board[r][c]===board[r][c-1]&&board[r][c]!==EMPTY;if(!same){if(c-s>=3)for(let k=s;k<c;k++)m.add(r+','+k);s=c;}}}
  for(let c=0;c<SIZE;c++){let s=0;for(let r=1;r<=SIZE;r++){const same=r<SIZE&&board[r][c]===board[r-1][c]&&board[r][c]!==EMPTY;if(!same){if(r-s>=3)for(let k=s;k<r;k++)m.add(k+','+c);s=r;}}}
  return m;
}
function pop(m){ m.forEach(k=>{const[r,c]=k.split(',').map(Number);const el=boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"] .gem`);if(el)el.parentElement.classList.add('pop');}); }
function clear(m){ m.forEach(k=>{const[r,c]=k.split(',').map(Number);board[r][c]=EMPTY;}); return m.size; }
function drop(){ for(let c=0;c<SIZE;c++){const st=[];for(let r=SIZE-1;r>=0;r--)if(board[r][c]!==EMPTY)st.push(board[r][c]);for(let r=SIZE-1;r>=0;r--)board[r][c]=st.length?st.shift():rnd();} }
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function resolve(){
  busy=true; let chain=0;
  while(true){
    const m=findMatches(); if(!m.size)break;
    chain++; pop(m); beep(440+chain*120); await sleep(180);
    const n=clear(m); score+=Math.round(n*10*(1+(chain-1)*0.5));
    document.getElementById('score').textContent=score;
    document.getElementById('chain').textContent=chain;
    render(); await sleep(60); drop(); render(); await sleep(170);
  }
  busy=false; document.getElementById('chain').textContent=0;
}
async function trySwap(a,b){
  if(busy||!adj(a,b))return; swap(a,b); render(); await sleep(120);
  if(findMatches().size){ await resolve(); } else { swap(a,b); render(); }
}

boardEl.addEventListener('click',async e=>{
  if(busy)return; const cell=e.target.closest('.cell'); if(!cell)return; audioOn();
  const p={r:+cell.dataset.r,c:+cell.dataset.c};
  if(!sel){sel=p;render();return;}
  if(sel.r===p.r&&sel.c===p.c){sel=null;render();return;}
  if(adj(sel,p)){const a=sel;sel=null;render();await trySwap(a,p);}else{sel=p;render();}
});
// スワイプ
let ts=null;
boardEl.addEventListener('touchstart',e=>{audioOn();const cell=e.target.closest('.cell');if(!cell)return;ts={r:+cell.dataset.r,c:+cell.dataset.c,x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
boardEl.addEventListener('touchend',e=>{
  if(!ts||busy)return; const dx=e.changedTouches[0].clientX-ts.x, dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)<14&&Math.abs(dy)<14){sel={r:ts.r,c:ts.c};render();ts=null;return;}
  let b=Math.abs(dx)>Math.abs(dy)?{r:ts.r,c:ts.c+(dx>0?1:-1)}:{r:ts.r+(dy>0?1:-1),c:ts.c};
  if(b.r>=0&&b.r<SIZE&&b.c>=0&&b.c<SIZE)trySwap({r:ts.r,c:ts.c},b); sel=null; ts=null;
},{passive:true});

// かんたん効果音
let ac=null; function audioOn(){ if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)(); if(ac.state!=='running')ac.resume(); }
function beep(f){ if(!ac)return; const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle';o.frequency.value=f;
  g.gain.setValueAtTime(.18,ac.currentTime); g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.18);
  o.connect(g).connect(ac.destination); o.start(); o.stop(ac.currentTime+.2); }

(async function start(){ init(); render(); await resolve();
  score=0; document.getElementById('score').textContent=0; })(); // 初期連鎖はスコアに数えない
</script>
</body>
</html>
